    <div id="splash-fb" style="font-family:Georgia,serif;font-size:26px;color:#c9963a;display:none">Porta Al Sole</div>
    <div style="width:26px;height:2px;background:rgba(201,150,58,.25);border-radius:1px;overflow:hidden"><div style="width:100%;height:100%;background:#c9963a;animation:ld 1.1s ease-in-out infinite"></div></div>
